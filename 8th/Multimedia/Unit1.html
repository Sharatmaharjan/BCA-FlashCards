<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flashzy Pro • Unit 1: Introduction</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

body{
font-family:'Poppins',system-ui,sans-serif;
}

.perspective{
perspective:1400px;
}

.card-inner{
position:relative;
width:100%;
height:100%;
transform-style:preserve-3d;
transition:transform .7s cubic-bezier(.4,.2,.2,1);
}

.card-inner.flipped{
transform:rotateY(180deg);
}

.card-face{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
backface-visibility:hidden;
-webkit-backface-visibility:hidden;
border-radius:24px;
}

.card-front{
background:linear-gradient(135deg,#27272a,#18181b);
}

.card-back{
background:linear-gradient(135deg,#064e3b,#18181b);
transform:rotateY(180deg);
}
</style>
</head>

<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">

<div class="max-w-4xl w-full px-4 py-8">

<!-- HEADER -->

<div class="flex justify-between items-center mb-10">

<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-yellow-400 text-black rounded-2xl flex items-center justify-center text-3xl">🎬</div>

<div>
<h1 class="text-3xl font-bold">Flashzy Pro</h1>
<p class="text-yellow-400">Unit 1: Introduction</p>
</div>
</div>

<div class="flex items-center gap-4">

<div class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-3xl">
<span class="text-sm text-zinc-400">Shuffle</span>
<input type="checkbox" onchange="toggleShuffle()" id="shuffle-toggle">
</div>

<button onclick="showResults()" class="bg-white text-black px-5 py-2 rounded-3xl font-semibold">
📊 Results
</button>

</div>

</div>


<!-- CARD -->

<div class="relative max-w-2xl mx-auto">

<div onclick="flipCard()" class="perspective h-[420px] cursor-pointer">

<div id="card-inner" class="card-inner border border-zinc-700 rounded-3xl">

<!-- FRONT -->

<div class="card-face card-front">

<div class="text-yellow-400 text-3xl mb-6">📌</div>

<div id="front-text" class="text-3xl font-semibold max-w-md"></div>

<div class="absolute bottom-6 text-xs text-zinc-500 uppercase">
Tap / Space to flip
</div>

</div>


<!-- BACK -->

<div class="card-face card-back">

<div class="text-emerald-400 text-sm uppercase mb-4">
Answer
</div>

<div id="back-text" class="text-xl text-emerald-100 max-w-md leading-relaxed"></div>

<div class="absolute bottom-6 text-xs text-emerald-400/80 uppercase">
Multimedia Unit
</div>

</div>

</div>
</div>

<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-zinc-900 text-yellow-400 text-xs px-5 py-1 rounded-full">

<span id="card-number">1</span>
<span class="text-zinc-600">/</span>
<span id="total-cards">30</span>

</div>

</div>


<!-- CONTROLS -->

<div class="max-w-2xl mx-auto mt-10 flex justify-between items-center">

<button onclick="prevCard()" class="bg-zinc-900 px-6 py-3 rounded-3xl">
← Prev
</button>

<div class="flex gap-4">

<button onclick="markKnown();event.stopPropagation()" class="bg-emerald-500 px-6 py-3 rounded-3xl">
✅ Known
</button>

<button onclick="markReview();event.stopPropagation()" class="bg-amber-500 px-6 py-3 rounded-3xl">
📌 Review
</button>

</div>

<button onclick="nextCard()" class="bg-zinc-900 px-6 py-3 rounded-3xl">
Next →
</button>

</div>

</div>



<script>

const originalCards=[
{front:"What is Multimedia?",back:"Combination of text, graphics, audio, video and animation controlled by computer."},
{front:"Multimedia in Education",back:"Interactive e-learning modules, virtual labs and online courses."},
{front:"Multimedia in Business",back:"Corporate presentations, video meetings and product demos."},
{front:"Multimedia in Entertainment",back:"Video games, streaming platforms and animated films."},
{front:"Multimedia in Medicine",back:"3D visualization, telemedicine and surgery simulations."},
{front:"Multimedia in Government",back:"Public kiosks, digital information boards and defense simulators."},
{front:"Multimedia in Advertising",back:"Interactive ads, banners and digital catalogues."},
{front:"Hypertext",back:"Non-linear linked text structure like hyperlinks in Wikipedia."},
{front:"Hypermedia",back:"Extension of hypertext including images, video and sound."},
{front:"Nodes",back:"Basic units of information such as pages or media objects."},
{front:"Links",back:"Connections between nodes."},
{front:"Anchors",back:"Clickable start or end point of a hyperlink."},
{front:"Perception Medium",back:"Human senses used to receive information like sight or hearing."},
{front:"Representation Medium",back:"Internal digital formats such as JPEG, PNG, MP3."},
{front:"Presentation Medium",back:"Input and output devices like keyboard, monitor and speakers."},
{front:"Storage Medium",back:"Devices storing data such as HDD, SSD or USB."},
{front:"Transmission Medium",back:"Channels transferring data like fiber or WiFi."},
{front:"Multimedia System",back:"Computer system capable of integrating multiple media."},
{front:"Integration",back:"Combining all media elements into one system."},
{front:"Interactivity",back:"User controls the media content."},
{front:"Digital Representation",back:"All media stored in binary format."},
{front:"High Processing Power",back:"Needed for tasks like 4K video rendering."},
{front:"Large Storage",back:"Multimedia files require large storage."},
{front:"High Speed Network",back:"Needed for streaming media online."},
{front:"Multitasking OS",back:"Operating system running many media processes simultaneously."},
{front:"Specialized Hardware",back:"GPUs, sound cards and codecs."},
{front:"Synchronization",back:"Audio and video must remain perfectly timed."},
{front:"Data Management",back:"Handling large multimedia databases."},
{front:"Example of Multimedia App",back:"YouTube streaming platform."},
{front:"Future of Multimedia",back:"VR, AR and AI powered interactive media."}
]

let deck=[]
let statuses=new Array(30).fill("not")
let current=0
let flipped=false
let shuffle=false

function shuffleArray(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
[a[i],a[j]]=[a[j],a[i]]
}
return a
}

function prepareDeck(){

deck=[...Array(30).keys()]

if(shuffle) deck=shuffleArray(deck)

current=0

loadCard()
}

function loadCard(){

let idx=deck[current]

let card=originalCards[idx]

document.getElementById("front-text").textContent=card.front
document.getElementById("back-text").textContent=card.back

document.getElementById("card-number").textContent=current+1
document.getElementById("total-cards").textContent=deck.length

document.getElementById("card-inner").classList.remove("flipped")

flipped=false
}

function flipCard(){

flipped=!flipped

document.getElementById("card-inner").classList.toggle("flipped")

}

function nextCard(){
if(current<deck.length-1){
current++
loadCard()
}
}

function prevCard(){
if(current>0){
current--
loadCard()
}
}

function markKnown(){
statuses[deck[current]]="known"
setTimeout(nextCard,300)
}

function markReview(){
statuses[deck[current]]="review"
setTimeout(nextCard,300)
}

function toggleShuffle(){
shuffle=!shuffle
prepareDeck()
}

function showResults(){

let known=statuses.filter(s=>s==="known").length
let review=statuses.filter(s=>s==="review").length

let percent=Math.round(((known+review)/30)*100)

alert(
"Study Results\n\n"+
"Known: "+known+
"\nReview: "+review+
"\nCompletion: "+percent+"%"
)

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowRight") nextCard()

if(e.key==="ArrowLeft") prevCard()

if(e.key===" "){

e.preventDefault()
flipCard()

}

})

prepareDeck()

console.log("Flashzy Pro loaded successfully 🚀")

</script>

</body>
</html>
